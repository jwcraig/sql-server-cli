name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  validate-release-version:
    name: Validate Release Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract tag version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF#refs/tags/v}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches Cargo.toml version
        shell: bash
        run: |
          set -euo pipefail
          tag_version="${{ steps.version.outputs.version }}"
          cargo_version="$(awk -F '\"' '/^version = /{ print $2; exit }' Cargo.toml)"

          if [ "$tag_version" != "$cargo_version" ]; then
            echo "Tag version v${tag_version} does not match Cargo.toml version ${cargo_version}."
            exit 1
          fi

  build:
    name: Build ${{ matrix.target }}
    needs: validate-release-version
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: sscli
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: sscli
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: sscli
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: sscli
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: sscli.exe
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Package (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          tar czvf ../../../sscli-${{ matrix.target }}.tar.gz ${{ matrix.artifact }}

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../sscli-${{ matrix.target }}.zip ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sscli-${{ matrix.target }}
          path: sscli-${{ matrix.target }}.*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec mv {} release/ \;
          cd release
          sha256sum * > checksums-sha256.txt
          cat checksums-sha256.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*

  publish-crates:
    name: Publish to crates.io
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish
        shell: bash
        run: |
          set -euo pipefail
          log_file="$(mktemp)"
          trap 'rm -f "$log_file"' EXIT

          if cargo publish --token "${{ secrets.CARGO_REGISTRY_TOKEN }}" 2>&1 | tee "$log_file"; then
            exit 0
          fi

          if grep -qiE "already uploaded|already exists" "$log_file"; then
            echo "Crate version is already published; treating as success."
            exit 0
          fi

          echo "cargo publish failed for an unexpected reason."
          exit 1

  update-homebrew:
    name: Update Homebrew Formula
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Check configuration
        id: gate
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${{ secrets.HOMEBREW_TAP_TOKEN }}" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "HOMEBREW_TAP_TOKEN is not set; skipping Homebrew formula update."
            exit 0
          fi
          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        if: ${{ steps.gate.outputs.enabled == 'true' }}
        uses: actions/checkout@v4

      - name: Download release checksums
        if: ${{ steps.gate.outputs.enabled == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.release.outputs.version }}"
          checksum_url="https://github.com/jwcraig/sql-server-cli/releases/download/v${version}/checksums-sha256.txt"
          curl -fsSL "$checksum_url" -o checksums-sha256.txt
          cat checksums-sha256.txt

      - name: Checkout homebrew tap
        if: ${{ steps.gate.outputs.enabled == 'true' }}
        uses: actions/checkout@v4
        with:
          repository: jwcraig/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update and verify Homebrew formula
        if: ${{ steps.gate.outputs.enabled == 'true' }}
        shell: bash
        env:
          REPO_SLUG: jwcraig/sql-server-cli
        run: |
          set -euo pipefail
          ./scripts/update_homebrew_formula_from_release.sh \
            "${{ needs.release.outputs.version }}" \
            "homebrew-tap/Formula/sscli.rb" \
            "checksums-sha256.txt"

      - name: Commit and push
        if: ${{ steps.gate.outputs.enabled == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add Formula/sscli.rb
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "sscli ${{ needs.release.outputs.version }}"
          git push

  update-scoop:
    name: Update Scoop Manifest
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Check configuration
        id: gate
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${{ secrets.SCOOP_BUCKET_TOKEN }}" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "SCOOP_BUCKET_TOKEN is not set; skipping scoop update."
            exit 0
          fi
          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        if: ${{ steps.gate.outputs.enabled == 'true' }}
        uses: actions/checkout@v4

      - name: Download release checksums
        if: ${{ steps.gate.outputs.enabled == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.release.outputs.version }}"
          checksum_url="https://github.com/jwcraig/sql-server-cli/releases/download/v${version}/checksums-sha256.txt"
          curl -fsSL "$checksum_url" -o checksums-sha256.txt
          cat checksums-sha256.txt

      - name: Checkout scoop bucket
        if: ${{ steps.gate.outputs.enabled == 'true' }}
        uses: actions/checkout@v4
        with:
          repository: jwcraig/scoop-bucket
          token: ${{ secrets.SCOOP_BUCKET_TOKEN }}
          path: scoop-bucket

      - name: Update and verify manifest
        if: ${{ steps.gate.outputs.enabled == 'true' }}
        shell: bash
        env:
          REPO_SLUG: jwcraig/sql-server-cli
        run: |
          set -euo pipefail
          ./scripts/update_scoop_manifest_from_release.sh \
            "${{ needs.release.outputs.version }}" \
            "scoop-bucket/sscli.json" \
            "checksums-sha256.txt"

      - name: Commit and push
        if: ${{ steps.gate.outputs.enabled == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          cd scoop-bucket
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add sscli.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "sscli ${{ needs.release.outputs.version }}"
          git push

  verify-release-channels:
    name: Verify Release Channels
    needs: [release, publish-crates, update-homebrew, update-scoop]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download release checksums
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.release.outputs.version }}"
          checksum_url="https://github.com/jwcraig/sql-server-cli/releases/download/v${version}/checksums-sha256.txt"
          curl -fsSL "$checksum_url" -o checksums-sha256.txt

      - name: Verify Homebrew formula
        shell: bash
        env:
          REPO_SLUG: jwcraig/sql-server-cli
        run: |
          set -euo pipefail
          git clone --depth 1 https://github.com/jwcraig/homebrew-tap.git homebrew-tap
          cp homebrew-tap/Formula/sscli.rb homebrew-tap/Formula/sscli.rb.before

          ./scripts/update_homebrew_formula_from_release.sh \
            "${{ needs.release.outputs.version }}" \
            "homebrew-tap/Formula/sscli.rb" \
            "checksums-sha256.txt"

          if ! cmp -s homebrew-tap/Formula/sscli.rb.before homebrew-tap/Formula/sscli.rb; then
            echo "Homebrew formula drift detected for v${{ needs.release.outputs.version }}."
            git -C homebrew-tap --no-pager diff -- Formula/sscli.rb
            exit 1
          fi

      - name: Verify Scoop manifest
        shell: bash
        env:
          REPO_SLUG: jwcraig/sql-server-cli
        run: |
          set -euo pipefail
          git clone --depth 1 https://github.com/jwcraig/scoop-bucket.git scoop-bucket
          cp scoop-bucket/sscli.json scoop-bucket/sscli.json.before

          ./scripts/update_scoop_manifest_from_release.sh \
            "${{ needs.release.outputs.version }}" \
            "scoop-bucket/sscli.json" \
            "checksums-sha256.txt"

          if ! cmp -s scoop-bucket/sscli.json.before scoop-bucket/sscli.json; then
            echo "Scoop manifest drift detected for v${{ needs.release.outputs.version }}."
            diff -u scoop-bucket/sscli.json.before scoop-bucket/sscli.json || true
            exit 1
          fi

      - name: Verify crates.io version
        shell: bash
        run: |
          set -euo pipefail
          expected="${{ needs.release.outputs.version }}"
          crates_version="$(curl -fsSL https://crates.io/api/v1/crates/sscli | jq -r '.crate.max_version')"

          if [ "$crates_version" != "$expected" ]; then
            echo "crates.io version mismatch: expected ${expected}, got ${crates_version}"
            exit 1
          fi
